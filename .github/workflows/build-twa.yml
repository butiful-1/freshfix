name: Build TWA APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['twa/**']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Bubblewrap deps
        uses: actions/cache@v4
        with:
          path: ~/.bubblewrap
          key: bubblewrap-${{ runner.os }}-v1

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Point Bubblewrap at system JDK
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$HOME/.bubblewrap/android_sdk\"}" \
            > ~/.bubblewrap/config.json

      - name: Restore or generate keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS || 'old2new_ks_2024!' }}
          KEY_PASS: ${{ secrets.KEY_PASS || 'old2new_key_2024!' }}
        run: |
          cd twa
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Restoring keystore from secret…"
            echo "$KEYSTORE_BASE64" | base64 -d > android.keystore
          else
            echo "Generating new keystore (first run)…"
            keytool -genkeypair -v \
              -keystore android.keystore \
              -alias old2new \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KEYSTORE_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=Old2New, OU=App, O=Old2New, L=US, S=US, C=US" \
              -noprompt
            echo ""
            echo "=== Save this as KEYSTORE_BASE64 secret for future builds ==="
            base64 -w 0 android.keystore
            echo ""
          fi

      - name: Print SHA-256 fingerprint
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS || 'old2new_ks_2024!' }}
        run: |
          cd twa
          echo ""
          echo "=== SHA-256 fingerprint — paste into assetlinks.json ==="
          keytool -list -v -keystore android.keystore -alias old2new \
            -storepass "$KEYSTORE_PASS" 2>&1 | grep "SHA256:"
          echo ""

      - name: Build TWA APK
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS || 'old2new_ks_2024!' }}
          KEY_PASS: ${{ secrets.KEY_PASS || 'old2new_key_2024!' }}
        run: |
          cd twa
          # Pipe answers: Y=SDK download, then keystore password, key password
          printf "Y\n%s\n%s\n" "$KEYSTORE_PASS" "$KEY_PASS" | \
            bubblewrap build --skipPwaValidation 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: old2new-twa-release
          path: twa/app-release-signed.apk
          if-no-files-found: error
