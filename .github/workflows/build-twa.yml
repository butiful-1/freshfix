name: Build TWA APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['twa/**']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Restore or generate keystore
        working-directory: twa/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS || 'old2new_ks_2024!' }}
          KEY_PASS: ${{ secrets.KEY_PASS || 'old2new_key_2024!' }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Restoring keystore from secret..."
            echo "$KEYSTORE_BASE64" | base64 -d > android.keystore
          else
            echo "Generating new keystore (first run)..."
            keytool -genkeypair -v \
              -keystore android.keystore \
              -alias old2new \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KEYSTORE_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=Old2New, OU=App, O=Old2New, L=US, S=US, C=US" \
              -noprompt
            echo ""
            echo "=== First run: save this as KEYSTORE_BASE64 secret for reproducible future builds ==="
            base64 -w 0 android.keystore
            echo ""
          fi

      - name: Print SHA-256 fingerprint
        working-directory: twa/android
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS || 'old2new_ks_2024!' }}
        run: |
          echo ""
          echo "=== SHA-256 fingerprint — add this to public/.well-known/assetlinks.json ==="
          keytool -list -v -keystore android.keystore -alias old2new \
            -storepass "$KEYSTORE_PASS" 2>&1 | grep "SHA256:"
          echo ""

      - name: Build signed APK
        working-directory: twa/android
        env:
          KEYSTORE_PATH: android.keystore
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS || 'old2new_ks_2024!' }}
          KEY_ALIAS: old2new
          KEY_PASS: ${{ secrets.KEY_PASS || 'old2new_key_2024!' }}
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: old2new-twa-release
          path: twa/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
